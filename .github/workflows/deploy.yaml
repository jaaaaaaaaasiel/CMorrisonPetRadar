name: Deploy to DigitalOcean

on:
  workflow_run:
    workflows: ["Build Docker Image"]
    types:
      - completed
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Deploy al droplet via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/opt/pets-api

            mkdir -p $APP_DIR
            cd $APP_DIR

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ghcr.io -u "${{ secrets.DOCKER_USER }}" --password-stdin

            docker pull ${{ env.REGISTRY }}/${{ secrets.DOCKER_USER }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest

            cat > .env <<'ENVEOF'
            PORT=${{ secrets.PORT }}
            MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }}
            MAILER_EMAIL=${{ secrets.MAILER_EMAIL }}
            MAILER_PASSWORD=${{ secrets.MAILER_PASSWORD }}
            MAILER_SERVICE=${{ secrets.MAILER_SERVICE }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            APPINSIGHTS_CONNECTION_STRING="${{ secrets.APPINSIGHTS_CONNECTION_STRING }}"
            ENVEOF

            cat > compose.yaml <<'COMPOSEEOF'
            services:
              incident-api:
                image: ghcr.io/${{ secrets.DOCKER_USER }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
                container_name: PetRadar
                ports:
                  - 4000:4000
                env_file:
                  - .env
                environment:
                  DB_HOST: postgres
                  REDIS_HOST: redis
                depends_on:
                  - postgres
                  - redis
                restart: unless-stopped

              postgres:
                image: postgis/postgis:16-master
                container_name: PostgisDB
                ports:
                  - 5432:5432
                environment:
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                  POSTGRES_DB: ${DB_NAME}
                volumes:
                  - postgres_data_db:/var/lib/postgresql
                restart: unless-stopped

              redis:
                image: redis
                container_name: pet-radar-redis
                ports:
                  - 6379:6379
                volumes:
                  - redis_data_db:/data
                restart: unless-stopped

            volumes:
              postgres_data_db:
              redis_data_db:
            COMPOSEEOF

            docker compose down --remove-orphans
            docker compose up -d

            docker image prune -f
